<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="./assets/css/register.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="page-register">
         <h2>انضم إلى متطوع</h2>
    <div class="input-register">
                <input type="text" placeholder="الاسم الأول" required>
                <i class='bx bxs-user-circle' ></i>
            </div>

             <div class="input-register">
                <input type="text"  placeholder="الاسم الأخير"  required>
            </div>
            <div class="input-register">
                <input type="text"  placeholder="اسم المستخدم"  required>
                <i class='bx bxs-user-pin'></i>
            </div>
            
            <div class="input-register">
                <input type="email" placeholder="البريد الإلكتروني" required>
                <i class='bx bx-envelope' ></i>
                
            </div>

             <div class="input-register">
                <input type="password"  placeholder="كلمة السر"  required>
                <i class='bx bxs-lock-alt'></i>
            </div>
            <div class="input-register">
                <input type="password"  placeholder="تأكيد كلمة السر"  required>
            </div>
             <div class="input-register">
                <input type="number" placeholder="رقم الهاتف" required>
                <i class='bx bx-phone' ></i>
            </div>
            <div class="input-register">
                <input type="text" placeholder="الاختصاص"><i class='bx bx-code'></i>
                <label for="major"></label>
                <select id="major" name="major" class="input-label">
                    <option value="front">Front end</option>
                    <option value="back">Back end</option>
                    <option value="flutter">Flutter</option>
                </select>
            </div>
             <div class="input-register">
                <input type="text" placeholder="مهاراتك" required>
                <i class='bx bx-bullseye'></i>
            </div>
            <div class="input-register">
            <input type="text" placeholder="وقت الفراغ المتاح للتطوع">

             <label for="time"></label>
            <select id="time" name="time" class="input-label">
                <option value="eight">من 8 إلى 12</option>
                <option value="eleven">من 12 إلى 16</option>
                <option value="sixty">من 16 إلى 20</option>
            </select>
            <i class='bx bx-time-five'></i> 
           
            </div> 
           
             <button type="submit" class="btn">تسجيل</button>
              <div class="register">
             <p>
                <a href="register.html" class="a1" style="color: #3b0764;">إنشاء حساب</a>
                <a href="login.html" class="a2" style="color: #3b0764;">تسجيل الدخول</a>
            </p>
            </div>
            </div>
</body>
</html>
