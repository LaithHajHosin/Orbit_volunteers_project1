<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="./assets/css/register.css" />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-register">
      <form id="register-form">
        <h2>انضم إلى متطوع</h2>

        <div class="input-register">
          <input
            type="text"
            id="reg-firstname"
            placeholder="الاسم الأول"
            required
          />
          <i class="bx bxs-user-circle"></i>
        </div>

        <div class="input-register">
          <input
            type="text"
            id="reg-lastname"
            placeholder="الاسم الأخير"
            required
          />
          <i class="bx bxs-user-circle" style="opacity: 0"></i>
        </div>

        <div class="input-register">
          <input
            type="text"
            id="reg-username"
            placeholder="اسم المستخدم"
            required
          />
          <i class="bx bxs-user-pin"></i>
        </div>

        <div class="input-register">
          <input
            type="email"
            id="reg-email"
            placeholder="البريد الإلكتروني"
            required
          />
          <i class="bx bx-envelope"></i>
        </div>

        <div class="input-register">
          <input
            type="password"
            id="reg-password"
            placeholder="كلمة السر"
            required
          />
          <i class="bx bxs-lock-alt"></i>
        </div>

        <div class="input-register">
          <input type="text" id="reg-gender" placeholder="الجنس" required />
        </div>

        <div class="input-register">
          <input
            type="number"
            id="reg-phone"
            placeholder="رقم الهاتف"
            required
          />
          <i class="bx bx-phone"></i>
        </div>

        <div class="input-register">
          <select
            id="reg-major"
            name="major"
            class="input-label input-register"
            required
          >
            <option value="" disabled selected class="option-name">اختر الاختصاص</option>
            <option value="front">Front end</option>
            <option value="back">Back end</option>
            <option value="flutter">Flutter</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="input-register">
          <input
            type="text"
            id="reg-skills"
            placeholder="مهاراتك (مثال: HTML, CSS, JS)"
          />
          <i class="bx bx-bullseye"></i>
        </div>

        <div class="input-register">
          <select id="reg-time" name="time" class="input-label input-register">
            <option value="" disabled selected class="option-name">وقت الفراغ المتاح للتطوع</option>
            <option value="8-12">من 8 إلى 12</option>
            <option value="12-16">من 12 إلى 16</option>
            <option value="16-20">من 16 إلى 20</option>
          </select>
        </div>

        <p
          id="register-message"
          style="text-align: center; margin-top: 10px; font-weight: bold"
        ></p>

        <button type="submit" class="btn">تسجيل</button>

        <div class="register">
          <p>
            لديك حساب بالفعل؟
            <a href="login.html" class="a2" style="color: #3b0764"
              ><b>تسجيل الدخول</b></a
            >
          </p>
        </div>
      </form>
    </div>
  </body>
</html>
