<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="main.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="page-register">
         <h2>Register</h2>
    <div class="input-register">
                <input type="text" placeholder="First Name" required>
                <i class='bx bxs-user-circle' ></i>
            </div>

             <div class="input-register">
                <input type="text"  placeholder="Last Name"  required>
            </div>
            
            <div class="input-register">
                <input type="email" placeholder="Enter your email" required>
                <i class='bx bx-envelope' ></i>
                
            </div>

             <div class="input-register">
                <input type="password"  placeholder="Password"  required>
                <i class='bx bxs-lock-alt'></i>
            </div>
            <div class="input-register">
                <input type="password"  placeholder="Confirm your password"  required>
            </div>
             <div class="input-register">
                <input type="number" placeholder="Enter your phone number" required>
                <i class='bx bx-phone' ></i>
            </div>
             <div class="input-register">
                <input type="text" placeholder="Enter your skills" required>
                <i class='bx bx-bullseye'></i>
            </div>
            <div class="input-register">
            <input type="text" placeholder="Select your free time">

             <label for="time"></label>
            <select id="time" name="time" class="input-label">
                <option value="eight">from 8 to 12</option>
                <option value="eleven">from 12 to 16</option>
                <option value="sixty">from 16 to 20</option>
            </select>
            <i class='bx bx-time-five'></i> 
           
            </div> 
           
             <button type="submit" class="btn">Register</button>
              <div class="register">
             <p>
                <a href="register.html" class="a1" style="color: #3b0764;">Creat an account</a>
                <a href="login.html" class="a2" style="color: #3b0764;">Login</a>
            </p>
            </div>
            </div>
</body>
</html>
