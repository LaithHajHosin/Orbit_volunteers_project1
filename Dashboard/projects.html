<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المشاريع - لوحة التحكم</title>
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../assets/css/home.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/blog.css" />
    <link rel="stylesheet" href="../assets/css/login.css" />
    <link rel="stylesheet" href="../assets/css/blogDashboard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-container">
      <div id="sidebar-container"></div>

      <main class="main-content">
        <div class="content-body">
          <div class="page-header">
            <h2>إدارة المشاريع</h2>
          </div>

          <div class="card">
            <h3>المشاريع</h3>
            <div class="table-responsive">
              <table class="data-table" id="projects-table">
                <thead>
                  <tr>
                    <th>المعرف</th>
                    <th>العنوان</th>
                    <th>الحالة</th>
                    <th>التصنيف</th>
                    <th>الفريق</th>
                    <th>تاريخ النشر</th>
                  </tr>
                </thead>
                <tbody id="projects-tbody"></tbody>
              </table>
            </div>
            <div class="table-actions" style="margin-top: 15px;">
              <button class="btn btn-primary" id="showAddProjectBtn">
                <i class="fa-solid fa-plus"></i> إضافة مشروع جديد
              </button>
              <button class="btn btn-primary" id="showAddCategoryBtn">
                <i class="fa-solid fa-plus"></i> إضافة تصنيف مشروع جديد
              </button>
            </div>
          </div>

          <div class="form-card hidden" id="project-form-container">
            <h4 id="project-form-title">إضافة مشروع جديد</h4>
            <form id="project-form">
              <input type="hidden" id="project-id" />
              <div class="form-group">
                <label for="project-title">العنوان <span class="required">*</span></label>
                <input type="text" id="project-title" required placeholder="عنوان المشروع" />
              </div>
              <div class="form-group">
                <label for="project-status">الحالة <span class="required">*</span></label>
                <select id="project-status" required>
                  <option value="need_volunteers">يحتاج متطوعين</option>
                  <option value="in_progress">قيد التنفيذ</option>
                  <option value="completed">منجز</option>
                  <option value="on_hold">معلق</option>
                </select>
              </div>
              <div class="form-group">
                <label for="project-category">التصنيف <span class="required">*</span></label>
                <select id="project-category" required></select>
              </div>
              <div class="form-group">
                <label for="project-team">معرف الفريق</label>
                <input type="number" id="project-team" placeholder="معرف الفريق (اختياري)" />
              </div>
              <div class="form-group">
                <label for="project-description">الوصف</label>
                <textarea id="project-description" rows="4" placeholder="اكتب وصف المشروع هنا..."></textarea>
              </div>
              <div class="form-group">
                <label for="project-image">الصورة</label>
                <input type="text" id="project-image" placeholder="https://example.com/image.jpg" />
              </div>
              <div class="form-buttons">
                <button type="submit" class="btn btn-success" id="project-submit-btn">حفظ</button>
                <button type="button" class="btn btn-secondary" id="project-cancel-btn">إلغاء</button>
              </div>
            </form>
          </div>

          <div class="form-card hidden" id="category-form-container">
            <h4 id="category-form-title">إضافة تصنيف مشروع جديد</h4>
            <form id="category-form">
              <input type="hidden" id="category-id" />
              <div class="form-group">
                <label for="category-name">التصنيف <span class="required">*</span></label>
                <input type="text" id="category-name" required placeholder="مثال: تقنية" />
              </div>
              <div class="form-buttons">
                <button type="submit" class="btn btn-success" id="category-submit-btn">حفظ</button>
                <button type="button" class="btn btn-secondary" id="category-cancel-btn">إلغاء</button>
              </div>
            </form>
          </div>

        </div>
      </main>
    </div>

    <script src="../assets/js/dashboard/sidebar.js"></script>
    <script src="../assets/js/dashboard/projectDashboard.js"></script>
  </body>
</html>
