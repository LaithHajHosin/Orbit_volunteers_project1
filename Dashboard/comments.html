<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>التعليقات - لوحة التحكم</title>
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <link rel="stylesheet" href="../assets/css/home.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/blog.css" />
    <link rel="stylesheet" href="../assets/css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard-container">
      <div id="sidebar-container"></div>

      <main class="main-content">
        <div class="content-body">
          <div class="page-header">
            <h2>إدارة التعليقات</h2>
          </div>
          <div class="card">
<div class="filter-bar">
        <div class="filter-group">
            <label for="typeFilter">عرض تعليقات:</label>
            <select id="typeFilter">
                <option value="blog">المدونات (Blogs)</option>
                <option value="project">المشاريع (Projects)</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="idFilter">بالمعرّف (ID):</label>
            <input type="number" id="idFilter" value="1" min="1" style="width: 70px;">
        </div>
        <span style="color: #94a3b8; font-size: 0.85rem; margin-right: auto;">* تتحدث البيانات تلقائياً عند تغيير الخيارات</span>
    </div>

    <!-- حاوية التعليقات -->
    <div id="commentsWrapper" class="comments-list">
        <!-- يتم توليد التعليقات هنا بواسطة الجافاسكربت -->
    </div>

          </div>
        </div>
      </main>
    </div>

    <script src="../assets/js/dashboard/sidebar.js"></script>
    <script src="../assets/js/dashboard/comments.js"></script>
  
  </body>
</html>
