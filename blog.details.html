<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="stylesheet" href="./assets/css/article.css" />
    <link rel="stylesheet" href="./assets/css/blog.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>article</title>
  </head>
  <body>
    <main>
      <header>
        <main-navbar></main-navbar>
      </header>


    <section class="article-hero">
      <div class="container article-hero-inner" id="articleHero">
      </div>
    </section>

      <div id="articleFullContent" style="display: none;"></div>
    </section>


<div class="interaction-section" id="interactionSection">
  <div class="likes-dislikes">
    <button class="like-btn" id="likeBtn">
      <i class="fa-regular fa-thumbs-up"></i> 
      <span id="likeCount">0</span>
    </button>
    <button class="dislike-btn" id="dislikeBtn">
      <i class="fa-regular fa-thumbs-down"></i> 
      <span id="dislikeCount">0</span>
    </button>
  </div>

  <div class="comments-section">
    <h3>التعليقات</h3>
    <div id="commentsList" class="comments-list"></div>
    <div class="add-comment">
      <textarea id="commentText" rows="2" placeholder="اكتب تعليقك..."></textarea>
      <button id="submitCommentBtn" class="btn-primary">أضف تعليق</button>
    </div>
  </div>
</div>





      
    <main-footer></main-footer>
    </main>
    <script src="./assets/js/main.js"></script>
    <script src="./assets/js/article.js"></script>
  </body>
</html>
