<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <link rel="stylesheet" href="./assets/css/home.css" />
    <link rel="stylesheet" href="./assets/css/blog.css" />
    <link rel="stylesheet" href="./assets/css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>متطوع</title>
  </head>

  <body>
    <main>
      <header>
        <main-navbar></main-navbar>

        <section class="hero">
      
          <div class="home-actions hero-actions">
            <button id="open-register-btn" class="home-bottons">
              تطوع الآن
            </button>
            <button class="home-bottons">
              <a href="./allProjects.html">اكتشف المشاريع</a>
            </button>
          </div>
        </section>
      </header>

      <section id="projects" class="projects">
        <h1 class="home-section-title">المشاريع</h1>
        <div class="projects-container fcb">
          <div class="project-card"></div>
        </div>
        <div class="all-projects">
          <button class="home-bottons">
            <a href="./allProjects.html">استكشف المزيد</a>
          </button>
        </div>
      </section>

      <section id="articles-section" class="articles-section">
        <div class="container">
          <div class="section-heading">
            <h2 class="section-title">المقالات</h2>
            <span class="section-title-bg">حصري</span>
          </div>
          <div class="articles-grid"></div>
        </div>
        <div class="all-projects">
          <button class="home-bottons">
            <a href="./allBlogs.html">استكشف المزيد</a>
          </button>
        </div>
      </section>

      <section id="about-us" class="about-us">
        <h1 class="home-section-title">أهدافنا</h1>
        <div class="about-us-container fcb">
      
        </div>
      </section>

      <section id="our-team" class="our-team">
        <h1 class="home-section-title">فرقنا</h1>

        <div id="teams-grid" class="teams-grid"></div>
        <div class="all-projects">
          <button class="home-bottons">
            <a href="./allTeams.html">استكشف المزيد</a>
          </button>
        </div>
      </section>

      <section class="join-now">
        <h2 class="join-title">انضم الآن</h2>
        <div class="home-actions join-actions">
          <button class="home-bottons">
            <a href="./contact us.html">ارسل رسالة</a>
          </button>
          <button class="home-bottons" id='open-register-btn'>
            انشىء حساب
          </button>
        </div>
      </section>


      
      <main-footer></main-footer>
    </main>

    <!-- forms -->
    <div id="login-modal" class="modal-overlay">
      <div class="page-login">
        <form id="login-form">
          <h1>تسجيل الدخول</h1>
          <div class="input-login">
            <input
              type="email"
              id="email"
              placeholder="البريد الإلكتروني"
              required
            />
            <i class="bx bxs-user-circle"></i>
          </div>
          <div class="input-login">
            <input
              type="password"
              id="login-password"
              placeholder="كلمة السر"
              required
            />
            <i class="bx bxs-lock-alt"></i>
          </div>
          <div class="remember-login">
            <label><input type="checkbox" /> تذكرني</label>
            <a href="#">نسيت كلمة السر ؟</a>
          </div>
          <p
            id="login-message"
            style="text-align: center; margin-top: 10px; font-weight: bold"
          ></p>
          <button type="submit" class="btn">تسجيل الدخول</button>
          <div class="register">
            <p>
              ليس لديك حساب ؟
              <a href="#" id="go-to-register"><b>تسجيل حساب جديد</b></a>
            </p>
          </div>
        </form>
      </div>
    </div>

    <div id="register-modal" class="modal-overlay">
      <div class="page-login">
        <form id="register-form">
          <h1>إنشاء حساب جديد</h1>

          <div class="input-login">
            <input
              type="text"
              id="reg-username"
              placeholder="اسم المستخدم (Username)"
              required
            />
            <i class="bx bxs-user"></i>
          </div>

          <div class="input-login" style="display: flex; gap: 10px">
            <input
              type="text"
              id="reg-firstname"
              placeholder="الاسم الأول"
              required
            />
            <input
              type="text"
              id="reg-lastname"
              placeholder="الكنية / العائلة"
              required
            />
          </div>

          <div class="input-login">
            <input
              type="email"
              id="reg-email"
              placeholder="البريد الإلكتروني"
              required
            />
            <i class="bx bxs-envelope"></i>
          </div>

          <div class="input-login">
            <input
              type="password"
              id="reg-password"
              placeholder="كلمة السر (6 أحرف على الأقل)"
              minlength="6"
              required
            />
            <i class="bx bxs-lock-alt"></i>
          </div>

          <p
            id="register-message"
            style="text-align: center; margin-top: 10px; font-weight: bold"
          ></p>

          <button type="submit" class="btn">إنشاء الحساب</button>

          <div class="register">
            <p>
              لديك حساب بالفعل؟
              <a href="#" id="go-to-login"><b>تسجيل الدخول</b></a>
            </p>
          </div>
        </form>
      </div>
    </div>

    <script src="./assets/js/home.js"></script>
    <script src="./assets/js/allprojects.js"></script>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
